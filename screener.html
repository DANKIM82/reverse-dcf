<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>역DCF 유니버스 스크리너</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{h
  --bg:#F4F5F7; --panel:#FFFFFF; --ink:#1A1D23; --muted:#757D8A;
  --line:#E2E5EA; --line-soft:#EDEFF3; --navy:#22304A;
  --red:#D6403C; --red-soft:#FBEAE9; --blue:#2563C9; --blue-soft:#E8EFFB;
  --amber:#B7791F; --amber-soft:#FBF3E4;
  --sans:'IBM Plex Sans KR',Pretendard,-apple-system,'Malgun Gothic',sans-serif;
  --mono:'IBM Plex Mono','IBM Plex Sans KR',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.45}
button{font-family:var(--sans);cursor:pointer}
input,select{font-family:var(--sans);font-size:.92rem;color:var(--ink)}
.num{font-family:var(--mono);font-variant-numeric:tabular-nums}

/* ---------- 헤더 ---------- */
header{background:var(--navy);color:#fff;padding:.7rem 1.2rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
header h1{font-size:1.05rem;font-weight:700;letter-spacing:-.01em}
header h1 span{font-weight:400;opacity:.55;margin-left:.5rem;font-size:.85rem}
.badge{font-size:.72rem;font-weight:600;padding:.15rem .55rem;border-radius:3px;letter-spacing:.02em}
.badge.demo{background:var(--amber);color:#fff}
.badge.live{background:#2E9E5B;color:#fff}
.hd-actions{margin-left:auto;display:flex;gap:.45rem}
.hd-actions button{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:#fff;
  padding:.32rem .7rem;border-radius:4px;font-size:.8rem;font-weight:500}
.hd-actions button:hover{background:rgba(255,255,255,.22)}

/* ---------- 가정 콕핏 ---------- */
.cockpit{background:var(--panel);border-bottom:1px solid var(--line);padding:.65rem 1.2rem;
  display:flex;align-items:center;gap:1.4rem;flex-wrap:wrap}
.ctl{display:flex;flex-direction:column;gap:.18rem}
.ctl label{font-size:.68rem;font-weight:600;color:var(--muted);letter-spacing:.04em;text-transform:uppercase}
.ctl-row{display:flex;align-items:center;gap:.4rem}
.ctl input[type=number]{width:4.6rem;padding:.25rem .4rem;border:1px solid var(--line);border-radius:4px;font-family:var(--mono)}
.ctl input[type=range]{width:9rem;accent-color:var(--navy)}
.ctl select{padding:.25rem .4rem;border:1px solid var(--line);border-radius:4px;background:#fff}
.ctl .val{font-family:var(--mono);font-size:.85rem;font-weight:600;min-width:4.2rem}
.chk{display:flex;align-items:center;gap:.3rem;font-size:.82rem;color:var(--ink)}
.chk input{accent-color:var(--navy)}
.presets{display:flex;gap:.3rem}
.presets button{border:1px solid var(--line);background:#fff;padding:.28rem .65rem;border-radius:4px;font-size:.78rem;font-weight:500}
.presets button:hover{border-color:var(--navy)}
.presets button.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.solve-time{margin-left:auto;font-size:.75rem;color:var(--muted)}
.solve-time b{font-family:var(--mono);color:var(--ink)}

/* ---------- 요약 스트립 ---------- */
.summary{display:flex;gap:0;background:var(--panel);border-bottom:1px solid var(--line);padding:0 1.2rem;overflow-x:auto}
.stat{padding:.55rem 1.3rem .55rem 0;margin-right:1.3rem;border-right:1px solid var(--line-soft)}
.stat:last-child{border-right:none}
.stat .k{font-size:.68rem;color:var(--muted);font-weight:600;letter-spacing:.03em}
.stat .v{font-family:var(--mono);font-size:1.05rem;font-weight:600;margin-top:.05rem}
.stat .v.red{color:var(--red)} .stat .v.blue{color:var(--blue)}

/* ---------- 필터 ---------- */
.filters{padding:.6rem 1.2rem;display:flex;align-items:center;gap:.7rem;flex-wrap:wrap}
.search{position:relative}
.search input{width:15rem;padding:.35rem .6rem .35rem 1.8rem;border:1px solid var(--line);border-radius:5px;background:#fff}
.search::before{content:"⌕";position:absolute;left:.55rem;top:.28rem;color:var(--muted);font-size:1rem}
.chips{display:flex;gap:.3rem;flex-wrap:wrap}
.chip{border:1px solid var(--line);background:#fff;padding:.22rem .6rem;border-radius:99px;font-size:.76rem;color:var(--ink)}
.chip:hover{border-color:var(--navy)}
.chip.on{background:var(--navy);border-color:var(--navy);color:#fff}
.chip.sig-long.on{background:var(--red);border-color:var(--red)}
.chip.sig-short.on{background:var(--blue);border-color:var(--blue)}
.f-label{font-size:.72rem;color:var(--muted);font-weight:600}

/* ---------- 테이블 ---------- */
.table-wrap{margin:0 1.2rem 2rem;background:var(--panel);border:1px solid var(--line);border-radius:6px;overflow:auto;max-height:calc(100vh - 250px)}
table{width:100%;border-collapse:collapse;font-size:.85rem;min-width:1080px}
thead th{position:sticky;top:0;background:#FAFBFC;border-bottom:1px solid var(--line);
  padding:.5rem .6rem;font-size:.7rem;font-weight:600;color:var(--muted);letter-spacing:.03em;
  text-align:right;white-space:nowrap;cursor:pointer;user-select:none;z-index:2}
thead th.l{text-align:left}
thead th:hover{color:var(--ink)}
thead th .arr{font-size:.6rem;margin-left:.15rem}
tbody td{padding:.42rem .6rem;border-bottom:1px solid var(--line-soft);text-align:right;white-space:nowrap}
tbody td.l{text-align:left}
tbody tr{cursor:pointer}
tbody tr:hover{background:#F6F8FB}
tbody tr.excluded{opacity:.5}
.nm{font-weight:600}
.cd{color:var(--muted);font-size:.74rem;font-family:var(--mono);margin-left:.35rem}
.sec{font-size:.76rem;color:var(--muted)}
td .pos{color:var(--red)} td .neg{color:var(--blue)}
.tag{display:inline-block;width:1.5rem;text-align:center;font-size:.7rem;font-weight:700;border-radius:3px;padding:.1rem 0}
.tag.L{background:var(--red-soft);color:var(--red)}
.tag.S{background:var(--blue-soft);color:var(--blue)}
.tag.W{background:var(--amber-soft);color:var(--amber)}
.tag.none{color:#C6CBD3}
.flag{display:inline-block;font-size:.66rem;font-weight:600;padding:.08rem .4rem;border-radius:3px;margin-left:.25rem;background:var(--line-soft);color:var(--muted)}
.flag.warn{background:var(--amber-soft);color:var(--amber)}
.sig{font-size:.74rem;font-weight:600}
.sig.long{color:var(--red)} .sig.short{color:var(--blue)} .sig.neutral{color:var(--muted)}

/* 갭 다이버징 바 — 시그니처 */
.gapcell{display:flex;align-items:center;gap:.5rem;justify-content:flex-end}
.gapbar{width:110px;height:12px;position:relative;flex:none}
.gapbar::before{content:"";position:absolute;left:50%;top:-2px;bottom:-2px;width:1px;background:var(--line)}
.gapbar .fill{position:absolute;top:1px;height:10px;border-radius:2px}
.gapbar .fill.long{right:50%;background:var(--red)}
.gapbar .fill.short{left:50%;background:var(--blue)}
.gapv{font-family:var(--mono);min-width:4.4rem;font-weight:600}

/* ---------- 드로어 ---------- */
.overlay{position:fixed;inset:0;background:rgba(20,26,40,.35);opacity:0;pointer-events:none;transition:opacity .18s;z-index:10}
.overlay.open{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:-560px;width:560px;max-width:96vw;height:100vh;background:var(--panel);
  box-shadow:-8px 0 30px rgba(20,26,40,.18);transition:right .22s ease;z-index:11;display:flex;flex-direction:column}
.drawer.open{right:0}
.dr-head{padding:1rem 1.3rem .8rem;border-bottom:1px solid var(--line)}
.dr-head h2{font-size:1.15rem;font-weight:700}
.dr-head .sub{color:var(--muted);font-size:.8rem;margin-top:.15rem}
.dr-close{position:absolute;top:.9rem;right:1rem;background:none;border:none;font-size:1.3rem;color:var(--muted)}
.dr-body{overflow-y:auto;padding:1rem 1.3rem 2rem;flex:1}
.dr-sec{margin-bottom:1.4rem}
.dr-sec h3{font-size:.72rem;font-weight:700;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;margin-bottom:.55rem}
.kv{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.6rem}
.kv .cell{background:#FAFBFC;border:1px solid var(--line-soft);border-radius:5px;padding:.5rem .6rem}
.kv .cell .k{font-size:.66rem;color:var(--muted);font-weight:600}
.kv .cell .v{font-family:var(--mono);font-size:1rem;font-weight:600;margin-top:.1rem}
.pvbar{height:14px;border-radius:4px;overflow:hidden;display:flex;margin:.4rem 0 .25rem}
.pvbar .a{background:var(--navy)} .pvbar .b{background:#B9C4D6}
.pvlegend{font-size:.72rem;color:var(--muted)}
.tagbtns{display:flex;gap:.4rem}
.tagbtns button{flex:1;padding:.4rem 0;border-radius:5px;border:1px solid var(--line);background:#fff;font-weight:600;font-size:.82rem}
.tagbtns button.on-L{background:var(--red);border-color:var(--red);color:#fff}
.tagbtns button.on-S{background:var(--blue);border-color:var(--blue);color:#fff}
.tagbtns button.on-W{background:var(--amber);border-color:var(--amber);color:#fff}
.ov-grid{display:grid;grid-template-columns:1fr 1fr;gap:.6rem}
.ov-grid .ctl input{width:100%}
.heat{border-collapse:collapse;width:100%;font-size:.74rem}
.heat th,.heat td{border:1px solid var(--line-soft);padding:.3rem .2rem;text-align:center;font-family:var(--mono)}
.heat th{background:#FAFBFC;color:var(--muted);font-weight:600;font-size:.68rem}
.heat td{font-weight:600}
.heat td.base{outline:2px solid var(--navy);outline-offset:-2px}
textarea.note{width:100%;min-height:70px;border:1px solid var(--line);border-radius:5px;padding:.5rem;font-family:var(--sans);font-size:.85rem;resize:vertical}
.dr-warn{background:var(--amber-soft);border:1px solid #EAD9B0;color:#7A5B1E;border-radius:5px;padding:.55rem .7rem;font-size:.8rem;margin-bottom:1rem}
.empty{padding:3rem;text-align:center;color:var(--muted)}
@media (max-width:760px){
  .cockpit{gap:.8rem} .search input{width:100%}
  html{font-size:13px}
}
@media (prefers-reduced-motion:reduce){.drawer,.overlay{transition:none}}
</style>
</head>
<body>

<header>
  <h1>역DCF 유니버스 스크리너 <span>implied growth vs 앵커 갭 기반 L/S 후보 랭킹</span></h1>
  <span id="srcBadge" class="badge demo">DEMO 데이터</span>
  <div class="hd-actions">
    <button id="btnLoadData">데이터 JSON 불러오기</button>
    <button id="btnSaveWs">워크스페이스 저장</button>
    <button id="btnLoadWs">워크스페이스 불러오기</button>
    <button id="btnCsv">CSV 내보내기</button>
  </div>
</header>

<div class="cockpit">
  <div class="ctl">
    <label>WACC 기준</label>
    <div class="ctl-row">
      <select id="waccMode">
        <option value="sector">섹터 기본 + 시프트</option>
        <option value="global">전역 고정</option>
      </select>
      <input type="range" id="waccShift" min="-200" max="200" step="25" value="0">
      <span class="val" id="waccShiftVal">+0bp</span>
      <input type="number" id="waccGlobal" step="0.1" value="9.5" style="display:none"> 
      <span id="waccGlobalPct" style="display:none;font-size:.85rem">%</span>
    </div>
  </div>
  <div class="ctl">
    <label>영구성장률 g∞</label>
    <div class="ctl-row"><input type="number" id="tg" step="0.1" value="1.0"><span style="font-size:.85rem">%</span></div>
  </div>
  <div class="ctl">
    <label>추정기간 N</label>
    <div class="ctl-row"><select id="nYears"><option>5</option><option>7</option><option>10</option></select><span style="font-size:.85rem">년</span></div>
  </div>
  <div class="ctl">
    <label>FCF 기준</label>
    <div class="ctl-row"><select id="fcfBasis"><option value="ttm">TTM</option><option value="avg3">3Y 평균</option></select></div>
  </div>
  <div class="ctl">
    <label>옵션</label>
    <div class="ctl-row">
      <span class="chk"><input type="checkbox" id="fade">fade</span>
      <span class="chk"><input type="checkbox" id="midYear">mid-year</span>
    </div>
  </div>
  <div class="ctl">
    <label>신호 임계 |갭|</label>
    <div class="ctl-row"><input type="number" id="thr" step="0.5" value="3.0" style="width:3.6rem"><span style="font-size:.85rem">%p</span></div>
  </div>
  <div class="ctl">
    <label>시나리오</label>
    <div class="presets">
      <button data-preset="base" class="active">Base</button>
      <button data-preset="bear">Bear</button>
      <button data-preset="bull">Bull</button>
    </div>
  </div>
  <div class="solve-time">유니버스 재계산 <b id="solveMs">–</b> ms</div>
</div>

<div class="summary" id="summary"></div>

<div class="filters">
  <div class="search"><input id="q" type="text" placeholder="종목명·코드 검색  ( / )"></div>
  <span class="f-label">신호</span>
  <div class="chips" id="sigChips">
    <button class="chip sig-long" data-sig="long">롱 후보</button>
    <button class="chip sig-short" data-sig="short">숏 후보</button>
    <button class="chip" data-sig="neutral">중립</button>
    <button class="chip" data-sig="excluded">제외</button>
  </div>
  <span class="f-label">태그</span>
  <div class="chips" id="tagChips">
    <button class="chip" data-tag="L">L</button>
    <button class="chip" data-tag="S">S</button>
    <button class="chip" data-tag="W">W</button>
  </div>
  <span class="f-label">섹터</span>
  <div class="chips" id="secChips"></div>
</div>

<div class="table-wrap">
  <table id="tbl">
    <thead><tr id="thr-row"></tr></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<div class="overlay" id="overlay"></div>
<aside class="drawer" id="drawer">
  <div class="dr-head" style="position:relative">
    <h2 id="drName">–</h2>
    <div class="sub" id="drSub"></div>
    <button class="dr-close" id="drClose" aria-label="닫기">×</button>
  </div>
  <div class="dr-body" id="drBody"></div>
</aside>

<input type="file" id="fileData" accept=".json" style="display:none">
<input type="file" id="fileWs" accept=".json" style="display:none">

/* ============================================================
   상태
   ============================================================ */
let DATA = EMBEDDED;
const WS = {              // 워크스페이스: 파일로 저장/복원 (브라우저 저장소 미사용)
  tags: {},               // code -> 'L'|'S'|'W'
  notes: {},              // code -> string
  overrides: {},          // code -> {wacc?, anchor?, fcf0?, margin?}
};
const VIEW = {
  sortKey: 'gap', sortAsc: true, q: '',
  sig: new Set(), tags: new Set(), sectors: new Set(),
};
let ROWS = [];            // 계산 결과 캐시
let currentCode = null;

/* ============================================================
   역DCF 솔버 (단조함수 이분법 — pipeline.py와 동일 로직)
   ============================================================ */
function calcEV(fcf0, g, wacc, tg, N, fade, midYear){
  let pv = 0, f = fcf0;
  for(let t=1; t<=N; t++){
    const gt = fade ? g + (tg - g)*(t-1)/(N-1 || 1) : g;
    f *= (1+gt);
    pv += f / Math.pow(1+wacc, midYear ? t-0.5 : t);
  }
  const tv = f*(1+tg)/(wacc-tg);
  return {ev: pv + tv/Math.pow(1+wacc, midYear ? N-0.5 : N), pvFcf: pv, fcfN: f, tv};
}
function solveG(targetEV, fcf0, wacc, tg, N, fade, midYear){
  if(!(fcf0>0) || !(targetEV>0)) return {status:'fcf<=0'};
  if(wacc<=tg) return {status:'wacc<=tg'};
  let lo=-0.5, hi=1.0;
  if(calcEV(fcf0,lo,wacc,tg,N,fade,midYear).ev > targetEV) return {status:'범위밖(저)'};
  if(calcEV(fcf0,hi,wacc,tg,N,fade,midYear).ev < targetEV) return {status:'범위밖(고)'};
  for(let i=0;i<70;i++){
    const mid=(lo+hi)/2;
    if(calcEV(fcf0,mid,wacc,tg,N,fade,midYear).ev > targetEV) hi=mid; else lo=mid;
  }
  const g=(lo+hi)/2, d=calcEV(fcf0,g,wacc,tg,N,fade,midYear);
  return {status:'ok', g, tvShare:(d.ev-d.pvFcf)/d.ev, exitMult:d.tv/d.fcfN, fcfN:d.fcfN};
}

/* ============================================================
   가정 읽기 & 전체 재계산
   ============================================================ */
const $ = id => document.getElementById(id);
function assumptions(){
  return {
    waccMode: $('waccMode').value,
    waccShift: parseFloat($('waccShift').value)/1e4,
    waccGlobal: parseFloat($('waccGlobal').value)/100,
    tg: parseFloat($('tg').value)/100,
    N: parseInt($('nYears').value),
    basis: $('fcfBasis').value,
    fade: $('fade').checked, midYear: $('midYear').checked,
    thr: parseFloat($('thr').value)/100,
  };
}
function waccFor(nm, A){
  const ov = WS.overrides[nm.code];
  if(ov && ov.wacc != null) return ov.wacc;
  if(A.waccMode==='global') return A.waccGlobal;
  return (DATA.sector_wacc[nm.sector] ?? 0.095) + A.waccShift;
}
function recompute(){
  const t0 = performance.now();
  const A = assumptions();
  ROWS = DATA.names.map(nm=>{
    const ov = WS.overrides[nm.code] || {};
    const wacc = waccFor(nm, A);
    let fcf0 = ov.fcf0 != null ? ov.fcf0 : (A.basis==='ttm' ? nm.fcf_ttm : nm.fcf_3y_avg);
    let basisUsed = ov.fcf0 != null ? '수기' : (A.basis==='ttm' ? 'TTM' : '3Y평균');
    let marginMode = false;
    // 음수 FCF -> 매출×정상화마진으로 자동 전환 (implied REVENUE growth)
    if(!(fcf0>0) && nm.revenue_ttm>0){
      const m = ov.margin != null ? ov.margin : nm.norm_fcf_margin;
      if(m>0){ fcf0 = nm.revenue_ttm*m; marginMode = true; basisUsed='마진기준'; }
    }
    const sol = solveG(nm.ev, fcf0, wacc, A.tg, A.N, A.fade, A.midYear);
    const anchorRaw = ov.anchor != null ? ov.anchor : nm.fcf_cagr_5y;
    const anchor = anchorRaw != null ? anchorRaw : null;
    let gap = null, signal = 'excluded';
    if(nm.holdco){ signal='excluded'; }
    else if(sol.status==='ok'){
      gap = anchor != null ? sol.g - anchor : null;
      if(gap==null) signal='neutral';
      else if(gap <= -A.thr) signal='long';
      else if(gap >=  A.thr) signal='short';
      else signal='neutral';
    }
    return {nm, wacc, fcf0, basisUsed, marginMode, sol, anchor,
            anchorIsOv: ov.anchor!=null, gap, signal,
            evfcf: (fcf0>0? nm.ev/fcf0 : null)};
  });
  $('solveMs').textContent = (performance.now()-t0).toFixed(1);
  render();
}

const fmtKRW = x => x==null ? '–' : (Math.abs(x)>=1e4 ? (x/1e4).toFixed(1)+'조' : Math.round(x).toLocaleString()+'억');
const fmtPct = (x,d=1) => x==null ? '–' : (x*100).toFixed(d)+'%';
const fmtX = x => x==null ? '–' : x.toFixed(1)+'×';

const COLS = [
  {k:'tag',   t:'태그', l:1},
  {k:'name',  t:'종목', l:1},
  {k:'sector',t:'섹터', l:1},
  {k:'ev',    t:'EV'},
  {k:'fcf0',  t:'FCF 기준값'},
  {k:'evfcf', t:'EV/FCF'},
  {k:'g',     t:'Implied g'},
  {k:'anchor',t:'앵커 (5Y CAGR)'},
  {k:'gap',   t:'갭 = implied − 앵커'},
  {k:'tv',    t:'TV%'},
  {k:'exit',  t:'Exit×'},
  {k:'sig',   t:'신호'},
];
function sortVal(r,k){
  switch(k){
    case 'tag': return WS.tags[r.nm.code]||'zz';
    case 'name': return r.nm.name; case 'sector': return r.nm.sector;
    case 'ev': return r.nm.ev; case 'fcf0': return r.fcf0??-1e18;
    case 'evfcf': return r.evfcf??1e18;
    case 'g': return r.sol.g??1e18; case 'anchor': return r.anchor??1e18;
    case 'gap': return r.gap??1e18; case 'tv': return r.sol.tvShare??1e18;
    case 'exit': return r.sol.exitMult??1e18; case 'sig': return r.signal;
  }
}
function filtered(){
  return ROWS.filter(r=>{
    if(VIEW.q && !(r.nm.name.includes(VIEW.q) || r.nm.code.includes(VIEW.q))) return false;
    if(VIEW.sectors.size && !VIEW.sectors.has(r.nm.sector)) return false;
    if(VIEW.sig.size && !VIEW.sig.has(r.signal)) return false;
    if(VIEW.tags.size && !VIEW.tags.has(WS.tags[r.nm.code]||'')) return false;
    return true;
  }).sort((a,b)=>{
    const va=sortVal(a,VIEW.sortKey), vb=sortVal(b,VIEW.sortKey);
    const c = typeof va==='string' ? va.localeCompare(vb,'ko') : va-vb;
    return VIEW.sortAsc ? c : -c;
  });
}
function render(){
  // 헤더
  $('thr-row').innerHTML = COLS.map(c=>
    `<th class="${c.l?'l':''}" data-k="${c.k}">${c.t}${VIEW.sortKey===c.k?`<span class="arr">${VIEW.sortAsc?'▲':'▼'}</span>`:''}</th>`
  ).join('');
  $('thr-row').querySelectorAll('th').forEach(th=>th.onclick=()=>{
    const k=th.dataset.k;
    if(VIEW.sortKey===k) VIEW.sortAsc=!VIEW.sortAsc; else {VIEW.sortKey=k; VIEW.sortAsc=true;}
    render();
  });

  const rows = filtered();
  const A = assumptions();
  const GAP_CAP = 0.15; // 바 스케일 상한 ±15%p

  $('tbody').innerHTML = rows.length ? rows.map(r=>{
    const tag = WS.tags[r.nm.code];
    const g = r.sol.status==='ok' ? r.sol.g : null;
    const gapW = r.gap==null?0:Math.min(Math.abs(r.gap)/GAP_CAP,1)*50;
    const flags = [
      r.nm.holdco?'<span class="flag warn">지주</span>':'',
      r.marginMode?'<span class="flag">마진기준</span>':'',
      (r.sol.tvShare>0.8)?'<span class="flag warn">TV과다</span>':'',
      (r.sol.status!=='ok'&&!r.nm.holdco)?`<span class="flag warn">${r.sol.status}</span>`:'',
      r.anchorIsOv?'<span class="flag">앵커수정</span>':'',
    ].join('');
    const sigTxt = {long:'롱 후보',short:'숏 후보',neutral:'중립',excluded:'제외'}[r.signal];
    return `<tr data-code="${r.nm.code}" class="${r.signal==='excluded'?'excluded':''}">
      <td class="l"><span class="tag ${tag||'none'}">${tag||'·'}</span></td>
      <td class="l"><span class="nm">${r.nm.name}</span><span class="cd">${r.nm.code}</span>${flags}</td>
      <td class="l sec">${r.nm.sector}</td>
      <td class="num">${fmtKRW(r.nm.ev)}</td>
      <td class="num">${fmtKRW(r.fcf0)}<span style="color:var(--muted);font-size:.7rem"> ${r.basisUsed}</span></td>
      <td class="num">${fmtX(r.evfcf)}</td>
      <td class="num">${g==null?'–':fmtPct(g)}</td>
      <td class="num">${r.anchor==null?'–':fmtPct(r.anchor)}</td>
      <td><div class="gapcell">
        <div class="gapbar">${r.gap==null?'':`<div class="fill ${r.gap<0?'long':'short'}" style="width:${gapW}%"></div>`}</div>
        <span class="gapv ${r.gap==null?'':(r.gap<0?'pos':'neg')}">${r.gap==null?'–':(r.gap>0?'+':'')+fmtPct(r.gap)}</span>
      </div></td>
      <td class="num">${r.sol.tvShare==null?'–':Math.round(r.sol.tvShare*100)+'%'}</td>
      <td class="num">${fmtX(r.sol.exitMult)}</td>
      <td><span class="sig ${r.signal}">${sigTxt}</span></td>
    </tr>`;
  }).join('') : `<tr><td colspan="12"><div class="empty">조건에 맞는 종목이 없습니다. 필터를 해제해 보세요.</div></td></tr>`;

  document.querySelectorAll('#tbody tr[data-code]').forEach(tr=>tr.onclick=()=>openDrawer(tr.dataset.code));

  // 요약
  const ok = ROWS.filter(r=>r.sol.status==='ok');
  const gaps = ROWS.filter(r=>r.gap!=null).map(r=>r.gap).sort((a,b)=>a-b);
  const med = a => a.length? a[Math.floor(a.length/2)] : null;
  const gs = ok.map(r=>r.sol.g).sort((a,b)=>a-b);
  const nL = ROWS.filter(r=>r.signal==='long').length;
  const nS = ROWS.filter(r=>r.signal==='short').length;
  const tL = Object.values(WS.tags).filter(t=>t==='L').length;
  const tS = Object.values(WS.tags).filter(t=>t==='S').length;
  $('summary').innerHTML = `
    <div class="stat"><div class="k">유니버스</div><div class="v">${ROWS.length}</div></div>
    <div class="stat"><div class="k">해 수렴</div><div class="v">${ok.length}</div></div>
    <div class="stat"><div class="k">롱 후보</div><div class="v red">${nL}</div></div>
    <div class="stat"><div class="k">숏 후보</div><div class="v blue">${nS}</div></div>
    <div class="stat"><div class="k">중위 implied g</div><div class="v">${fmtPct(med(gs))}</div></div>
    <div class="stat"><div class="k">중위 갭</div><div class="v">${med(gaps)==null?'–':(med(gaps)>0?'+':'')+fmtPct(med(gaps))}</div></div>
    <div class="stat"><div class="k">태깅 L / S</div><div class="v">${tL} / ${tS}</div></div>`;
}

/* ============================================================
   드로어
   ============================================================ */
function openDrawer(code){
  currentCode = code;
  const r = ROWS.find(x=>x.nm.code===code); if(!r) return;
  const nm=r.nm, A=assumptions();
  $('drName').textContent = nm.name;
  $('drSub').textContent = `${nm.code} · ${nm.sector} · EV ${fmtKRW(nm.ev)} (시총 ${fmtKRW(nm.mktcap)} + 순차입 ${fmtKRW(nm.net_debt)})`;

  const ov = WS.overrides[code]||{};
  const g = r.sol.status==='ok'?r.sol.g:null;
  const reinvest = g!=null ? g/0.15 : null;

  // 민감도 히트맵: WACC ±1.0%p × g∞ ±0.5%p
  const ws=[-.01,-.005,0,.005,.01].map(d=>r.wacc+d);
  const ts=[-.005,-.0025,0,.0025,.005].map(d=>A.tg+d);
  let heat = `<table class="heat"><tr><th>WACC\\g∞</th>${ts.map(t=>`<th>${(t*100).toFixed(2)}%</th>`).join('')}</tr>`;
  for(const w of ws){
    heat += `<tr><th>${(w*100).toFixed(1)}%</th>`;
    for(const t of ts){
      const s = solveG(nm.ev, r.fcf0, w, t, A.N, A.fade, A.midYear);
      let bg='#fff', txt='–';
      if(s.status==='ok'){
        txt=fmtPct(s.g);
        if(r.anchor!=null){
          const gp=s.g-r.anchor, a=Math.min(Math.abs(gp)/0.12,1)*0.75;
          bg = gp<0?`rgba(214,64,60,${a})`:`rgba(37,99,201,${a})`;
        }
      }
      const isBase = Math.abs(w-r.wacc)<1e-9 && Math.abs(t-A.tg)<1e-9;
      heat += `<td class="${isBase?'base':''}" style="background:${bg}">${txt}</td>`;
    }
    heat += '</tr>';
  }
  heat += '</table>';

  const tag = WS.tags[code]||'';
  $('drBody').innerHTML = `
    ${nm.holdco?'<div class="dr-warn">지주사 — 연결 FCF 역DCF 부적합. 상장 자회사 지분가치를 반영하는 NAV 기반 sum-of-parts 역산 권장. 신호 산출에서 제외됨.</div>':''}
    ${r.marginMode?'<div class="dr-warn">FCF 음수 — 매출 × 정상화 FCF마진 기준으로 전환됨. implied g는 <b>매출 성장률</b>로 해석.</div>':''}

    <div class="dr-sec">
      <h3>포지션 태그</h3>
      <div class="tagbtns">
        <button data-t="L" class="${tag==='L'?'on-L':''}">롱 L</button>
        <button data-t="S" class="${tag==='S'?'on-S':''}">숏 S</button>
        <button data-t="W" class="${tag==='W'?'on-W':''}">관찰 W</button>
        <button data-t="">해제</button>
      </div>
    </div>

    <div class="dr-sec">
      <h3>현재 가정 하 결과</h3>
      <div class="kv">
        <div class="cell"><div class="k">Implied g</div><div class="v">${g==null?r.sol.status:fmtPct(g,2)}</div></div>
        <div class="cell"><div class="k">앵커 대비 갭</div><div class="v" style="color:${r.gap==null?'inherit':(r.gap<0?'var(--red)':'var(--blue)')}">${r.gap==null?'–':(r.gap>0?'+':'')+fmtPct(r.gap,2)}</div></div>
        <div class="cell"><div class="k">적용 WACC</div><div class="v">${fmtPct(r.wacc)}</div></div>
        <div class="cell"><div class="k">Exit EV/FCF</div><div class="v">${fmtX(r.sol.exitMult)}</div></div>
        <div class="cell"><div class="k">필요 재투자율 <span style="font-weight:400">(ROIC 15%)</span></div><div class="v">${reinvest==null?'–':fmtPct(reinvest,0)}</div></div>
        <div class="cell"><div class="k">FCF 기준 (${r.basisUsed})</div><div class="v">${fmtKRW(r.fcf0)}</div></div>
      </div>
      ${r.sol.status==='ok'?`
      <div class="pvbar"><div class="a" style="width:${(1-r.sol.tvShare)*100}%"></div><div class="b" style="width:${r.sol.tvShare*100}%"></div></div>
      <div class="pvlegend">명시 구간 PV ${Math.round((1-r.sol.tvShare)*100)}% · Terminal Value ${Math.round(r.sol.tvShare*100)}% ${r.sol.tvShare>0.8?'— <b>TV 지배적, implied g는 터미널 가정의 함수에 가까움</b>':''}</div>`:''}
    </div>

    <div class="dr-sec">
      <h3>민감도 — implied g (색: 앵커 대비 갭, 빨강=저평가 / 파랑=고평가)</h3>
      ${heat}
    </div>

    <div class="dr-sec">
      <h3>개별 오버라이드 (비우면 기본값)</h3>
      <div class="ov-grid">
        <div class="ctl"><label>WACC %</label><input type="number" step="0.1" id="ovWacc" value="${ov.wacc!=null?(ov.wacc*100).toFixed(1):''}" placeholder="${(waccFor(nm,A)*100).toFixed(1)}"></div>
        <div class="ctl"><label>앵커 성장률 % (내 전망치)</label><input type="number" step="0.5" id="ovAnchor" value="${ov.anchor!=null?(ov.anchor*100).toFixed(1):''}" placeholder="${nm.fcf_cagr_5y!=null?(nm.fcf_cagr_5y*100).toFixed(1):'없음'}"></div>
        <div class="ctl"><label>FCF 기준값 (억)</label><input type="number" id="ovFcf" value="${ov.fcf0!=null?ov.fcf0:''}" placeholder="${r.fcf0!=null?Math.round(r.fcf0):''}"></div>
        <div class="ctl"><label>정상화 FCF마진 % (음수FCF용)</label><input type="number" step="0.5" id="ovMargin" value="${ov.margin!=null?(ov.margin*100).toFixed(1):''}" placeholder="${nm.norm_fcf_margin!=null?(nm.norm_fcf_margin*100).toFixed(1):''}"></div>
      </div>
      <div style="margin-top:.6rem;display:flex;gap:.5rem">
        <button class="chip" id="ovApply" style="font-weight:600">적용</button>
        <button class="chip" id="ovClear">오버라이드 초기화</button>
      </div>
    </div>

    <div class="dr-sec">
      <h3>메모 (워크스페이스에 저장)</h3>
      <textarea class="note" id="drNote" placeholder="투자 논지, 촉매, 리스크...">${WS.notes[code]||''}</textarea>
    </div>`;

  $('drBody').querySelectorAll('.tagbtns button').forEach(b=>b.onclick=()=>{
    const t=b.dataset.t;
    if(t) WS.tags[code]=t; else delete WS.tags[code];
    recompute(); openDrawer(code);
  });
  $('ovApply').onclick=()=>{
    const o={};
    const w=parseFloat($('ovWacc').value); if(!isNaN(w)) o.wacc=w/100;
    const a=parseFloat($('ovAnchor').value); if(!isNaN(a)) o.anchor=a/100;
    const f=parseFloat($('ovFcf').value); if(!isNaN(f)) o.fcf0=f;
    const m=parseFloat($('ovMargin').value); if(!isNaN(m)) o.margin=m/100;
    if(Object.keys(o).length) WS.overrides[code]=o; else delete WS.overrides[code];
    recompute(); openDrawer(code);
  };
  $('ovClear').onclick=()=>{ delete WS.overrides[code]; recompute(); openDrawer(code); };
  $('drNote').onchange=e=>{ 
    if(e.target.value.trim()) WS.notes[code]=e.target.value; else delete WS.notes[code];
  };

  $('drawer').classList.add('open'); $('overlay').classList.add('open');
}
function closeDrawer(){ $('drawer').classList.remove('open'); $('overlay').classList.remove('open'); currentCode=null; }
$('drClose').onclick=closeDrawer; $('overlay').onclick=closeDrawer;

/* ============================================================
   필터 UI
   ============================================================ */
function buildFilters(){
  const secs=[...new Set(DATA.names.map(n=>n.sector))].sort((a,b)=>a.localeCompare(b,'ko'));
  $('secChips').innerHTML = secs.map(s=>`<button class="chip" data-sec="${s}">${s}</button>`).join('');
  $('secChips').querySelectorAll('.chip').forEach(c=>c.onclick=()=>{
    const s=c.dataset.sec;
    VIEW.sectors.has(s)?VIEW.sectors.delete(s):VIEW.sectors.add(s);
    c.classList.toggle('on'); render();
  });
}
$('sigChips').querySelectorAll('.chip').forEach(c=>c.onclick=()=>{
  const s=c.dataset.sig;
  VIEW.sig.has(s)?VIEW.sig.delete(s):VIEW.sig.add(s);
  c.classList.toggle('on'); render();
});
$('tagChips').querySelectorAll('.chip').forEach(c=>c.onclick=()=>{
  const t=c.dataset.tag;
  VIEW.tags.has(t)?VIEW.tags.delete(t):VIEW.tags.add(t);
  c.classList.toggle('on'); render();
});
$('q').oninput=e=>{VIEW.q=e.target.value.trim(); render();};
document.addEventListener('keydown',e=>{
  if(e.key==='/' && document.activeElement.tagName!=='INPUT' && document.activeElement.tagName!=='TEXTAREA'){
    e.preventDefault(); $('q').focus();
  }
  if(e.key==='Escape') closeDrawer();
});

/* ============================================================
   콕핏 이벤트 & 프리셋
   ============================================================ */
['tg','nYears','fcfBasis','fade','midYear','thr','waccGlobal'].forEach(id=>$(id).onchange=recompute);
$('waccShift').oninput=()=>{
  const v=parseInt($('waccShift').value);
  $('waccShiftVal').textContent=(v>=0?'+':'')+v+'bp';
  recompute();
};
$('waccMode').onchange=()=>{
  const g=$('waccMode').value==='global';
  $('waccShift').style.display=g?'none':'';
  $('waccShiftVal').style.display=g?'none':'';
  $('waccGlobal').style.display=g?'':'none';
  $('waccGlobalPct').style.display=g?'':'none';
  recompute();
};
const PRESETS={
  base:{shift:0, tg:1.0}, bear:{shift:100, tg:0.5}, bull:{shift:-100, tg:1.5}
};
document.querySelectorAll('.presets button').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('.presets button').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
  const p=PRESETS[b.dataset.preset];
  $('waccShift').value=p.shift;
  $('waccShiftVal').textContent=(p.shift>=0?'+':'')+p.shift+'bp';
  $('tg').value=p.tg;
  recompute();
});

/* ============================================================
   입출력
   ============================================================ */
$('btnLoadData').onclick=()=>$('fileData').click();
$('fileData').onchange=e=>{
  const f=e.target.files[0]; if(!f) return;
  const rd=new FileReader();
  rd.onload=()=>{ try{
    const d=JSON.parse(rd.result);
    if(!d.names||!d.sector_wacc) throw new Error('스키마 불일치 — pipeline.py 출력 JSON이 필요합니다.');
    DATA=d;
    $('srcBadge').textContent = d.meta?.source==='live' ? '실데이터 · '+(d.meta.generated||'') : 'DEMO 데이터';
    $('srcBadge').className = 'badge '+(d.meta?.source==='live'?'live':'demo');
    buildFilters(); recompute();
  }catch(err){ alert('불러오기 실패: '+err.message); } };
  rd.readAsText(f); e.target.value='';
};
$('btnSaveWs').onclick=()=>{
  const blob=new Blob([JSON.stringify({saved:new Date().toISOString(), assumptions:assumptions(), ...WS},null,1)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='workspace_'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
};
$('btnLoadWs').onclick=()=>$('fileWs').click();
$('fileWs').onchange=e=>{
  const f=e.target.files[0]; if(!f) return;
  const rd=new FileReader();
  rd.onload=()=>{ try{
    const w=JSON.parse(rd.result);
    Object.assign(WS.tags, w.tags||{}); Object.assign(WS.notes, w.notes||{}); Object.assign(WS.overrides, w.overrides||{});
    recompute();
  }catch(err){ alert('불러오기 실패: '+err.message); } };
  rd.readAsText(f); e.target.value='';
};
$('btnCsv').onclick=()=>{
  const rows=filtered();
  const head='code,name,sector,tag,ev_억,fcf_기준_억,basis,ev_fcf,implied_g,anchor_g,gap,tv_share,exit_mult,signal,holdco,note';
  const esc=s=>'"'+String(s??'').replace(/"/g,'""')+'"';
  const body=rows.map(r=>[
    r.nm.code, esc(r.nm.name), r.nm.sector, WS.tags[r.nm.code]||'',
    r.nm.ev, r.fcf0!=null?Math.round(r.fcf0):'', r.basisUsed,
    r.evfcf!=null?r.evfcf.toFixed(2):'',
    r.sol.g!=null?(r.sol.g*100).toFixed(2):'', r.anchor!=null?(r.anchor*100).toFixed(2):'',
    r.gap!=null?(r.gap*100).toFixed(2):'',
    r.sol.tvShare!=null?(r.sol.tvShare*100).toFixed(1):'',
    r.sol.exitMult!=null?r.sol.exitMult.toFixed(1):'',
    r.signal, r.nm.holdco?1:0, esc(WS.notes[r.nm.code]||'')
  ].join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+head+'\n'+body],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='screener_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
};

/* ============================================================
   부팅: universe.json 자동 로드 시도 → 실패 시 EMBEDDED 폴백
   (GitHub Pages 등 HTTP 환경에선 최신 데이터, file:// 오프라인에선 EMBEDDED)
   ============================================================ */
function applyData(d){
  DATA = d;
  const live = d.meta?.source === 'live';
  $('srcBadge').textContent = live ? '실데이터 · ' + (d.meta.generated || '') : 'DEMO 데이터';
  $('srcBadge').className = 'badge ' + (live ? 'live' : 'demo');
  buildFilters(); recompute();
}
applyData(EMBEDDED);                          // 즉시 렌더(폴백 겸 초기 표시)
fetch('https://raw.githubusercontent.com/DANKIM82/reverse-dcf/main/universe.json', {cache: 'no-store'})
  .then(r => r.ok ? r.json() : Promise.reject(new Error('universe.json 없음')))
  .then(d => { if (d.names && d.names.length > 0 && d.sector_wacc) applyData(d); })
  .catch(() => {}); // 파일 없음/CORS/빈 names → EMBEDDED 유지
</script>
</body>
</html>
