name: Refresh universe data

# 매주 화 06:00 KST(월 21:00 UTC) 자동 실행 + 수동 실행 버튼
on:
  schedule:
    - cron: "0 21 * * 1"
  workflow_dispatch:

permissions:
  contents: write        # universe.json 갱신 커밋을 위해 필요

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Fetch live data
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: |
          python pipeline.py --fetch --universe universe.csv -o universe.json

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- universe.json; then
            echo "데이터 변화 없음 — 커밋 생략"
          else
            git add universe.json
            git commit -m "data: refresh $(date -u +%F)"
            git push
          fi
